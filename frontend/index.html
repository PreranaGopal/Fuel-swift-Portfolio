<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FuelSwift - Slot & Delivery</title>

  <!-- Bootstrap + Leaflet -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { background:#111; color:#ffe600; }
    .btn-theme { background:#000; color:#ffe600; font-weight:700; }
    .btn-theme:hover { background:#333; color:#fff200; }
    .screen { display:none; }
    .screen.active { display:block; }
    #mapSlot, #mapDelivery { height:380px; width:100%; margin-top:16px; border-radius:8px; }
    .card.bg-dark { background:#0b0b0b; }
    a { color:#ffe600; }
  </style>
</head>
<body>
  <div class="container py-4">

    <!-- Login -->
    <div id="loginScreen" class="screen active">
      <h2 class="text-center">🔑 Login</h2>
      <form id="loginForm" class="card p-4 bg-dark text-light mx-auto" style="max-width:420px;">
        <input id="loginEmail" type="email" class="form-control mb-3" placeholder="Email" required>
        <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password" required>
        <button type="submit" class="btn btn-theme w-100 mb-2">Login</button>
        <p class="text-center mb-0">New user? <a href="#" onclick="showScreen('signupScreen')">Signup</a></p>
      </form>
    </div>

    <!-- Signup -->
    <div id="signupScreen" class="screen">
      <h2 class="text-center">📝 Signup</h2>
      <form id="signupForm" class="card p-4 bg-dark text-light mx-auto" style="max-width:520px;">
        <div class="row g-2">
          <div class="col">
            <input id="firstName" type="text" class="form-control" placeholder="First Name" required>
          </div>
          <div class="col">
            <input id="lastName" type="text" class="form-control" placeholder="Last Name" required>
          </div>
        </div>
        <input id="signupEmail" type="email" class="form-control mt-3" placeholder="Email" required>
        <div class="input-group mt-3">
          <select id="countryCode" class="form-select" style="max-width:120px;">
            <option value="+91">+91</option>
            <option value="+1">+1</option>
            <option value="+44">+44</option>
            <option value="+61">+61</option>
          </select>
          <input id="phoneNumber" type="tel" class="form-control" placeholder="Phone number" required>
        </div>
        <input id="signupPass" type="password" class="form-control mt-3" placeholder="Password" required>
        <input id="signupConfirmPass" type="password" class="form-control mt-2" placeholder="Confirm Password" required>
        <button type="submit" class="btn btn-theme w-100 mt-3">Signup</button>
        <p class="text-center mt-2">Already have an account? <a href="#" onclick="showScreen('loginScreen')">Login</a></p>
      </form>
    </div>

    <!-- Choice -->
    <div id="choiceScreen" class="screen text-center">
      <h2>🚀 Choose Service</h2>
      <div class="d-grid gap-2 col-8 mx-auto mt-3">
        <button class="btn btn-theme" onclick="showScreen('slotScreen')">📅 Slot Booking</button>
        <button class="btn btn-theme" onclick="showScreen('fuelScreen')">⛽ Fuel Delivery</button>
      </div>
    </div>

    <!-- Slot Booking -->
    <div id="slotScreen" class="screen">
      <h2>📅 Slot Booking</h2>
      <div class="card p-3 bg-dark text-light">
        <label class="form-label">Fuel Type</label>
        <select id="slotFuel" class="form-select mb-2">
          <option value="">Select fuel</option>
          <option>Petrol</option>
          <option>Diesel</option>
          <option>Gas</option>
          <option>EV</option>
        </select>

        <label class="form-label">Choose Date & Time</label>
        <input id="slotTime" type="datetime-local" class="form-control mb-2">

        <button id="openSlotMap" class="btn btn-theme w-100 mb-2" onclick="showMapSlot()">Show Map & Find Stations</button>
        <div id="mapSlot"></div>

        <div class="mt-3 text-center">
          <button id="bookSlotBtn" class="btn btn-theme w-50" onclick="bookSlot()">Book Slot</button>
        </div>

        <div id="slotResult" class="mt-3 text-success text-center"></div>
        <div class="mt-3 text-center"><button class="btn btn-outline-light" onclick="goHome()">Back</button></div>
      </div>
    </div>

    <!-- Fuel Delivery -->
    <div id="fuelScreen" class="screen text-center">
      <h2>⛽ Fuel Delivery</h2>
      <div class="d-grid gap-2 col-8 mx-auto mt-3">
        <button class="btn btn-theme" onclick="showFuelTypes('Petrol')">Petrol</button>
        <button class="btn btn-theme" onclick="showFuelTypes('Diesel')">Diesel</button>
        <button class="btn btn-theme" onclick="showFuelTypes('Gas')">Gas</button>
      </div>
    </div>

    <!-- Fuel Types (dynamic) -->
    <div id="fuelTypesScreen" class="screen p-3">
      <h2 id="fuelTypesTitle"></h2>
      <div id="fuelOptions" class="d-grid gap-2 col-8 mx-auto"></div>
      <div class="text-center mt-3"><button class="btn btn-outline-light" onclick="showScreen('fuelScreen')">Back</button></div>
    </div>

    <!-- Stations List -->
    <div id="stationsScreen" class="screen p-3">
      <h2>🏭 Nearby Stations</h2>
      <div id="stationsList" class="list-group"></div>
      <div class="text-center mt-3">
        <button class="btn btn-outline-light" onclick="showScreen('fuelTypesScreen')">Back</button>
      </div>
    </div>

    <!-- Location for Delivery -->
    <div id="locationScreen" class="screen p-3">
      <h2>📍 Delivery Location</h2>
      <div class="card p-3 bg-dark text-light mx-auto" style="max-width:640px;">
        <form id="locationForm">
          <label class="form-label">Manual entry</label>
          <input id="deliveryStreet" class="form-control mb-2" placeholder="Street / House / Landmark">
          <input id="deliveryCity" class="form-control mb-2" placeholder="City">
          <input id="deliveryPincode" class="form-control mb-2" placeholder="Pincode">
          <button type="submit" class="btn btn-theme w-100 mb-2">Continue (Manual)</button>
        </form>

        <div class="text-center my-2">OR</div>

        <button class="btn btn-theme w-100 mb-2" onclick="getCurrentLocation()">Use Current Location</button>
        <div id="mapDelivery"></div>
        <div class="mt-3 text-center"><button class="btn btn-outline-light" onclick="showScreen('fuelScreen')">Back</button></div>
      </div>
    </div>

    <!-- Payment -->
    <div id="paymentScreen" class="screen p-3">
      <h2>💳 Payment</h2>
      <div class="card p-3 bg-dark text-light mx-auto" style="max-width:520px;">
        <div class="d-grid gap-2">
          <button class="btn btn-theme" onclick="selectPayment('UPI')">UPI</button>
          <button class="btn btn-theme" onclick="selectPayment('Card')">Card</button>
          <button class="btn btn-theme" onclick="selectPayment('Cash')">Cash</button>
        </div>
        <div id="paymentDetails" class="mt-3"></div>
        <div class="mt-3 text-center"><button class="btn btn-outline-light" onclick="showScreen('locationScreen')">Back</button></div>
      </div>
    </div>

    <!-- Dummy Payment -->
    <div id="dummyPaymentScreen" class="screen p-3">
      <h2>🔒 Payment Processing</h2>
      <div class="card p-3 bg-dark text-light mx-auto" style="max-width:520px;">
        <p id="dummyPaymentText">Processing...</p>
        <div class="text-center mt-3">
          <button class="btn btn-theme" onclick="finishDelivery('Dummy')">Complete (Dummy)</button>
        </div>
      </div>
    </div>

    <!-- Confirmation -->
    <div id="confirmScreen" class="screen p-3">
      <h2 class="text-success">✅ Order Confirmed</h2>
      <div class="card p-3 bg-dark text-light mx-auto" style="max-width:640px;">
        <p id="confirmDetails"></p>
        <div class="text-center mt-3"><button class="btn btn-theme" onclick="goHome()">Go Home</button></div>
      </div>
    </div>

  </div>

  <!-- External script file (you can also inline) -->
  <script src="script.js"></script>
</body>
</html>
