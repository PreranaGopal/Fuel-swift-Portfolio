<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FuelSwift Splash</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div class="splash-screen d-flex align-items-center justify-content-center vh-100">
    <div class="splash-box shadow rounded-4 p-4">
      
      <!-- Image at the top -->
      <div class="text-center mb-4">
        <img src="images/Screenshot 00.png" alt="Fuel Nozzle" class="img-fluid splash-image" width="200">
      </div>

      <!-- Text aligned left -->
      <div class="splash-text text-start mb-4">
        <h2 class="fw-bold text-dark">Fast & Reliable</h2>
        <p class="text-dark">Get fuel whenever you need,<br>we are there</p>
      </div>

      <!-- Boxed Get Started button -->
      <div class="text-center">
        <a href="index.html" class="btn btn-dark btn-lg w-100 rounded-3 shadow">
          🚀 Get Started ➡️
        </a>
      </div>

    </div>
  </div>
</body>
</html>
